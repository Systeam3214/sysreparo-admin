<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Bloqueado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #d32f2f; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 70px; /* Metade do tamanho anterior, muito mais elegante */
            margin-bottom: 20px;
            filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.15));
            animation: float-pulse 2s infinite alternate ease-in-out;
        }

        @keyframes float-pulse {
            0% { transform: scale(0.98); filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.1)); }
            100% { transform: scale(1.02); filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
        }

        h1 {
            font-size: 24px; /* Título bem menor e mais focado */
            font-weight: 700;
            text-transform: uppercase;
            margin: 0 0 60px 0; /* Distância refinada para o botão */
            letter-spacing: 5px; /* Espaçamento de letras maior dá um ar de UI de sistema super profissional */
            opacity: 0.95;
        }

        /* Botão transformado em um "Ghost Button" (borda vazada) -> Estilo padrão de aplicações premium */
        .btn-action {
            display: inline-block;
            background-color: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 28px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px; /* Cantos menos redondos (estilo tech) */
            letter-spacing: 1.5px;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            color: #d32f2f;
            background-color: #ffffff;
            border-color: #ffffff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Vanguard em miniatura elegante -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/94/Riot_Vanguard_Logo_Sep_2024.svg" alt="Riot Vanguard" class="logo-img">
        
        <h1>BLOQUEADO</h1>
        
        <a href="index.html" class="btn-action">Voltar</a>
    </div>

    <script>
        // Forçar Tela Cheia (Fullscreen)
        function enforceFullscreen() {
            let elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => console.log(err));
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            }
        }
        
        document.addEventListener('click', enforceFullscreen);
        document.addEventListener('keydown', enforceFullscreen);
        document.addEventListener('touchstart', enforceFullscreen);
    </script>
</body>
</html>
